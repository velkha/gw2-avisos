name: Aviso Discord

on:
  schedule:  
    - cron: "55 14 * * 3"
    - cron: "55 15 * * 3"
  workflow_dispatch:

jobs:
  send-discord-message:
    runs-on: ubuntu-latest

    steps:
      - name: Decidir si toca enviar en horario de Madrid
        id: gate
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          now = datetime.now(ZoneInfo("Europe/Madrid"))

          should_send = (
              event_name == "workflow_dispatch" or
              (now.weekday() in (1, 3) and now.hour == 9)
          )

          with open("/tmp/should_send.txt", "w") as f:
              f.write("true" if should_send else "false")

          print(f"Evento: {event_name}")
          print(f"Hora actual en Madrid: {now.isoformat()}")
          print(f"Enviar: {should_send}")
          PY

          echo "should_send=$(cat /tmp/should_send.txt)" >> $GITHUB_OUTPUT

      - name: Enviar mensaje a Discord
        if: steps.gate.outputs.should_send == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -i -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "@everyone tenemos raid hoy a las 21:30", "allowed_mentions": { "parse": ["everyone"] }}' \
               "$DISCORD_WEBHOOK_URL"
