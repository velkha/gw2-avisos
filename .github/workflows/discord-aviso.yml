name: Aviso Discord

on:
  schedule:
    # Se ejecuta martes y jueves a las 07:07 y 08:07 UTC.
    # El script de abajo decide si en Madrid son las 09:07.
    - cron: "7 7 * * 2,4"
    - cron: "7 8 * * 2,4"
  workflow_dispatch:

jobs:
  send-discord-message:
    runs-on: ubuntu-latest

    steps:
      - name: Decidir si toca enviar en horario de Madrid
        id: gate
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("Europe/Madrid"))

          # Martes=1, Jueves=3 en Python
          should_send = now.weekday() in (1, 3) and now.hour == 9 and now.minute >= 0

          with open("/tmp/should_send.txt", "w") as f:
              f.write("true" if should_send else "false")

          print(f"Hora actual en Madrid: {now.isoformat()}")
          print(f"Enviar: {should_send}")
          PY

          echo "should_send=$(cat /tmp/should_send.txt)" >> $GITHUB_OUTPUT

      - name: Enviar mensaje a Discord
        if: steps.gate.outputs.should_send == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                     "content": "Buenos días. Recordatorio automático del canal."
                   }' \
               "$DISCORD_WEBHOOK_URL"